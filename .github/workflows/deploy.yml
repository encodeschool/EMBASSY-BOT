name: Deploy to VDS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Build frontend ───────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin_web/package-lock.json

      - name: Install frontend deps
        working-directory: admin_web
        run: npm ci

      - name: Build frontend
        working-directory: admin_web
        env:
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
        run: |
          echo "VITE_BOT_USERNAME=${VITE_BOT_USERNAME}" > .env
          npm run build

      # ── 3. Deploy backend FIRST ──────────────────────────────
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VDS_PATH }}

            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/encodeschool/EMBASSY-BOT.git
            fi

            git fetch --depth=1 origin main
            git reset --hard origin/main

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

      # ── 4. Upload frontend AFTER git reset ───────────────────
      - name: Upload frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          source: "admin_web/dist/"
          target: "${{ secrets.VDS_PATH }}/admin_web/"
          overwrite: true

      # ── 5. Restart service & apply nginx config ──────────────────
      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VDS_PATH }}

            # Apply nginx config
            sudo cp deploy/nginx.conf /etc/nginx/sites-available/embassybot
            sudo ln -sf /etc/nginx/sites-available/embassybot /etc/nginx/sites-enabled/embassybot
            sudo nginx -t && sudo systemctl reload nginx

            sudo systemctl restart helpbot

            sleep 3
            curl -f http://localhost:8010/api/docs > /dev/null 2>&1 && echo "✅ API up" || echo "⚠️ Health check failed"

            echo "✅ Deploy complete"