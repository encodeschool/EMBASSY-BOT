name: Deploy to VDS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Build React admin panel ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin_web/package-lock.json

      - name: Install frontend dependencies
        working-directory: admin_web
        run: npm ci

      - name: Build frontend
        working-directory: admin_web
        env:
          VITE_BOT_USERNAME: ${{ secrets.VITE_BOT_USERNAME }}
        run: |
          echo "VITE_BOT_USERNAME=${VITE_BOT_USERNAME}" > .env
          npm run build

      # ── 3. Prepare target directory on server ──────────────────────────────
      - name: Create dist directory on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: mkdir -p ${{ secrets.VDS_PATH }}/admin_web/dist

      # ── 4. Upload built frontend to server ─────────────────────────────────
      - name: Upload admin_web/dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          source: "admin_web/dist/"
          target: "${{ secrets.VDS_PATH }}/admin_web/"
          overwrite: true

      # ── 5. Pull code & restart service ─────────────────────────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: |
            set -e

            # Clone on first deploy, pull on subsequent ones
            if [ ! -d "${{ secrets.VDS_PATH }}/.git" ]; then
              echo "==> First deploy: cloning repository..."
              git clone https://github.com/encodeschool/EMBASSY-BOT.git ${{ secrets.VDS_PATH }}
            else
              echo "==> Pulling latest code..."
              cd ${{ secrets.VDS_PATH }}
              git pull origin main
            fi

            cd ${{ secrets.VDS_PATH }}

            # Create venv if it doesn't exist yet
            if [ ! -d "venv" ]; then
              echo "==> Creating Python virtual environment..."
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install -r requirements.txt -q
            sudo systemctl restart helpbot
            echo "✅ Deployment complete at $(date)"
