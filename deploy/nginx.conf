# /etc/nginx/sites-available/embassybot
# Symlink: ln -s /etc/nginx/sites-available/embassybot /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name embassy.encode.uz;
    return 301 https://$host$request_uri;
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    server_name embassy.encode.uz;

    ssl_certificate     /etc/letsencrypt/live/embassy.encode.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/embassy.encode.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── API → FastAPI (port 8000) ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA — served directly by nginx ──────────────────────────────
    root /opt/embassybot/admin_web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
